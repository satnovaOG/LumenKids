<!-- Archivo: src/public/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumenKids - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-wrapper">
        <header class="login-header">
            <h1>LumenKids</h1>
            <p>Ecosistema Educativo Inteligente</p>
            <div id="user-button"></div>
        </header>

        <main class="login-main">
            <div class="controls-container" id="controls-container">
                
                <label for="user-action">¿Qué deseas hacer?</label>
                <select id="user-action" class="custom-select">
                    <option value="login">Iniciar Sesión</option>
                    <option value="signup">Crear Cuenta (Registrarse)</option>
                </select>

                <label id="label-user-role" for="user-role">Selecciona tu rol:</label>
                <select id="user-role" class="custom-select">
                    <option value="Estudiante">Estudiante</option>
                    <option value="Padre">Padre</option>
                    <option value="Mentor">Mentor</option>
                </select>

                <div id="parent-code-container" style="display: none; margin-top: 15px;">
                    <label for="parent-code">Código de Vinculación de tu hijo:</label>
                    <input type="text" id="parent-code" class="custom-input" placeholder="Ej: A1B2C3">
                </div>

                <div id="mentor-warning" style="display: none; margin-top: 15px; color: #ffcccc; font-size: 0.9rem;">
                    Las cuentas de Mentor son creadas por la Administración. Por favor, selecciona "Iniciar Sesión" si ya tienes cuenta.
                </div>
            </div>

            <div id="sign-in-container" style="margin-top: 20px;"></div>
            
            <div id="system-message" style="display: none; margin-top: 20px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;"></div>
        </main>
    </div>

    <!-- Script de Clerk. Recuerda reemplazar con tu clave publica -->
    <script 
        async crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_c3F1YXJlLW1hbi0yLmNsZXJrLmFjY291bnRzLmRldiQ" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js">
    </script>

    <script>
        window.addEventListener('load', async function () {
            await window.Clerk.load();

            const actionSelect = document.getElementById('user-action');
            const roleSelect = document.getElementById('user-role');
            const labelUserRole = document.getElementById('label-user-role');
            const parentCodeInput = document.getElementById('parent-code');
            const parentCodeContainer = document.getElementById('parent-code-container');
            const mentorWarning = document.getElementById('mentor-warning');
            const signInDiv = document.getElementById('sign-in-container');
            const controlsContainer = document.getElementById('controls-container');
            const systemMessage = document.getElementById('system-message');

            actionSelect.value = localStorage.getItem('lumenkids_action') || 'login';
            roleSelect.value = localStorage.getItem('lumenkids_role') || 'Estudiante';
            parentCodeInput.value = localStorage.getItem('lumenkids_parent_code') || '';

            function actualizarInterfaz() {
                const accion = actionSelect.value;
                const rol = roleSelect.value;

                localStorage.setItem('lumenkids_action', accion);
                localStorage.setItem('lumenkids_role', rol);
                localStorage.setItem('lumenkids_parent_code', parentCodeInput.value);

                parentCodeContainer.style.display = 'none';
                mentorWarning.style.display = 'none';
                signInDiv.style.display = 'flex';
                systemMessage.style.display = 'none';

                if (accion === 'login') {
                    roleSelect.style.display = 'none';
                    labelUserRole.style.display = 'none';
                    
                    // Traducción implementada mediante la propiedad localization para Iniciar Sesión
                    window.Clerk.mountSignIn(signInDiv, {
                        localization: {
                            signIn: {
                                start: {
                                    title: "Iniciar Sesión",
                                    subtitle: "¡Bienvenido! Por favor inicia sesión para continuar",
                                    actionText: "¿No tienes una cuenta?",
                                    actionLink: "Regístrate"
                                }
                            }
                        }
                    });
                } else {
                    roleSelect.style.display = 'block';
                    labelUserRole.style.display = 'block';

                    if (rol === 'Padre') {
                        parentCodeContainer.style.display = 'flex';
                        parentCodeContainer.style.flexDirection = 'column';
                    } else if (rol === 'Mentor') {
                        mentorWarning.style.display = 'block';
                        signInDiv.style.display = 'none'; 
                    }

                    if (signInDiv.style.display !== 'none') {
                        // Traducción implementada mediante la propiedad localization para Registro
                        window.Clerk.mountSignUp(signInDiv, {
                            localization: {
                                signUp: {
                                    start: {
                                        title: "Crear Cuenta",
                                        subtitle: "Únete a LumenKids",
                                        actionText: "¿Ya tienes una cuenta?",
                                        actionLink: "Inicia Sesión"
                                    }
                                }
                            }
                        });
                    }
                }
            }

            actionSelect.addEventListener('change', actualizarInterfaz);
            roleSelect.addEventListener('change', actualizarInterfaz);
            parentCodeInput.addEventListener('input', () => {
                localStorage.setItem('lumenkids_parent_code', parentCodeInput.value);
            });

            // Si el usuario ya está autenticado, procesamos la lógica de redirección
            if (window.Clerk.user) {
                controlsContainer.style.display = 'none';
                signInDiv.style.display = 'none';
                
                const userButtonDiv = document.getElementById('user-button');
                window.Clerk.mountUserButton(userButtonDiv);
                
                sincronizarUsuarioConBaseDeDatos(window.Clerk.user);
            } else {
                actualizarInterfaz();
            }
        });

        async function sincronizarUsuarioConBaseDeDatos(clerkUser) {
            const accion = localStorage.getItem('lumenkids_action');
            const rol = localStorage.getItem('lumenkids_role');
            const codigoPadre = localStorage.getItem('lumenkids_parent_code');
            const token = await window.Clerk.session.getToken();
            const nombre = clerkUser.fullName || clerkUser.firstName || 'Usuario';
            const correo = clerkUser.primaryEmailAddress ? clerkUser.primaryEmailAddress.emailAddress : '';
            const systemMessage = document.getElementById('system-message');

            if (accion === 'signup' && localStorage.getItem('lumenkids_synced') !== 'true') {
                try {
                    if (rol === 'Estudiante') {
                        const response = await fetch('/api/registro-estudiante', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ nombre: nombre })
                        });
                        const data = await response.json();
                        
                        if (response.ok) {
                            systemMessage.style.display = 'block';
                            systemMessage.innerHTML = `¡Registro exitoso!<br>Tu Código de Vinculación es: <span style="color: #4ade80; font-size: 1.2rem;">${data.codigo}</span><br>Compártelo con tus padres.`;
                        }
                    } 
                    else if (rol === 'Padre') {
                        const response = await fetch('/api/registro-padre', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ nombre: nombre, correo: correo, codigoHijo: codigoPadre })
                        });
                        
                        const data = await response.json();
                        systemMessage.style.display = 'block';
                        
                        if (response.ok) {
                            systemMessage.innerHTML = `¡Vinculación familiar exitosa!`;
                            systemMessage.style.color = '#4ade80';
                        } else {
                            systemMessage.innerHTML = `Error: ${data.error}`;
                            systemMessage.style.color = '#f87171';
                        }
                    }
                    
                    localStorage.setItem('lumenkids_synced', 'true');
                } catch (error) {
                    console.error('Error al intentar contactar al servidor:', error);
                }
            } else {
                // Flujo de Inicio de Sesión (Login) con redirección
                try {
                    systemMessage.style.display = 'block';
                    systemMessage.innerHTML = 'Verificando privilegios de administrador...';

                    const checkRes = await fetch('/api/verificar-rol', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    const dataCheck = await checkRes.json();
                    
                    // Si el servidor confirma que es administrador, redirigimos
                    if (dataCheck.rol === 'admin') {
                        window.location.replace('/admin.html');
                        return; // Detenemos la ejecución
                    } else {
                        // Si no es administrador, mostramos un mensaje de diagnóstico con el ID
                        systemMessage.innerHTML = `¡Bienvenido de nuevo, ${nombre}!<br><br>
                        <div style="background: rgba(255,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem;">
                            <strong>Nota de depuración:</strong> El servidor no detectó privilegios de Administrador.<br>
                            Tu ID de Clerk actual es:<br>
                            <span style="font-family: monospace; color: #ffcccc;">${clerkUser.id}</span><br><br>
                            Por favor, verifica que este ID sea <strong>exactamente el mismo</strong> que tienes configurado en la variable ADMIN_CLERK_ID de tu archivo .env.
                        </div>`;
                    }

                } catch (error) {
                    console.error('Error al verificar privilegios de administrador:', error);
                    systemMessage.innerHTML = 'Error al comunicarse con el servidor para verificar tu rol.';
                }
            }
        }
    </script>
</body>
</html>
