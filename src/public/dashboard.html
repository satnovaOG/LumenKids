<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumenKids - Panel Principal</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>Panel de Control LumenKids</h1>
            <!-- Botón de sesión de Clerk -->
            <div id="user-button"></div>
        </header>

        <!-- Panel del Docente (Oculto por defecto hasta verificar rol) -->
        <main id="teacher-panel" class="panel-section hidden">
            <h2>Gestión de Rutas de Aprendizaje (Coursera)</h2>
            
            <div class="form-card">
                <h3>Crear Nueva Ruta</h3>
                <form id="form-crear-ruta" class="controls-container">
                    <input type="text" id="nombre-curso" class="custom-input" placeholder="Nombre del Curso (Ej. Lógica Modal)" required>
                    <input type="text" id="area-curso" class="custom-input" placeholder="Área (Ej. Matemática Elemental)" required>
                    <input type="url" id="url-coursera" class="custom-input" placeholder="Enlace de Coursera (https://...)" required>
                    <button type="submit" class="custom-button">Guardar Ruta</button>
                </form>
            </div>

            <div class="form-card">
                <h3>Asignar Ruta a Estudiante</h3>
                <form id="form-asignar-ruta" class="controls-container">
                    <input type="text" id="id-estudiante" class="custom-input" placeholder="ID del Estudiante (Ej. user_2P...)" required>
                    <input type="number" id="id-ruta" class="custom-input" placeholder="ID numérico de la Ruta" required>
                    <button type="submit" class="custom-button">Vincular Ruta</button>
                </form>
            </div>

            <div class="form-card" style="margin-top: 30px;">
                <h3>Mis Cursos y Estudiantes Inscritos</h3>
                <div id="lista-cursos-docente">
                    <p>Cargando tus cursos...</p>
                </div>
            </div>
            
            <!-- Contenedor para mostrar mensajes de éxito o error al docente -->
            <div id="teacher-message" class="system-message hidden"></div>
        </main>

        <!-- Panel del Estudiante (Oculto por defecto hasta verificar rol) -->
        <main id="student-panel" class="panel-section hidden">
            <h2>Mis Rutas de Aprendizaje Activas</h2>
            <div id="rutas-container" class="rutas-grid">
                <!-- Aquí inyectaremos los links de Coursera dinámicamente con JS -->
                <p>Cargando tus módulos...</p>
            </div>
        </main>
    </div>

    <!-- Script principal de Clerk -->
    <script 
        async crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_c3F1YXJlLW1hbi0yLmNsZXJrLmFjY291bnRzLmRldiQ" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js">
    </script>
    
    <!-- En el Paso 4 crearemos este archivo JS para la interactividad -->
    <script src="dashboard.js"></script>
</body>
</html>
