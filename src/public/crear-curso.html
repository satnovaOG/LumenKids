<!-- Archivo: src/public/crear-curso.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumenKids - Constructor de Cursos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="dashboard-header">
            <div>
                <h1>Constructor de Cursos</h1>
                <a href="/dashboard.html" style="color: #4ade80; text-decoration: none; font-weight: bold;">← Volver al Panel Principal</a>
            </div>
            <div id="user-button"></div>
        </header>

        <main class="panel-section">
            <div class="form-card">
                <h3>Diseña la estructura de tu curso</h3>
                <form id="form-crear-curso" class="controls-container">
                    <p style="font-size: 0.9rem; margin-bottom: 15px;">Asegúrate de haber creado una Ruta Base en el panel principal y tener su ID numérico.</p>
                    
                    <input type="number" id="id-ruta-base" class="custom-input" placeholder="ID de la Ruta Base (Ej. 1)" required>
                    
                    <!-- Contenedor donde JavaScript inyectará los temas dinámicamente -->
                    <div id="contenedor-temas" style="width: 100%; text-align: left;"></div>
                    
                    <button type="button" id="btn-add-tema" class="custom-button" style="margin-top: 15px; background-color: #7C3AED;">+ Añadir Nuevo Módulo</button>
                    
                    <hr style="width: 100%; border: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
                    
                    <button type="submit" class="custom-button" style="background-color: #4ade80; color: #000;">Guardar Curso Completo</button>
                </form>
                
                <div id="crear-curso-message" class="system-message hidden"></div>
            </div>
        </main>
    </div>

    <script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_c3F1YXJlLW1hbi0yLmNsZXJrLmFjY291bnRzLmRldiQ" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
    <script src="crear-curso.js"></script>
</body>
</html>
